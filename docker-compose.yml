services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
      - ALLOWED_ORIGIN=http://localhost
    restart: unless-stopped
